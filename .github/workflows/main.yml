name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      arch:
        description: 'Android architecture'
        required: true
        default: 'armeabi-v7a'
        type: choice
        options:
          - armeabi-v7a
          - arm64-v8a

jobs:
  build-android:
    name: Build Android APK (${{ github.event.inputs.build_mode || 'debug' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # Step 1: Checkout repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Java
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Step 3: Setup Python
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 4: Install system dependencies
      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            git \
            python3-dev \
            python3-pip \
            libffi-dev \
            libssl-dev \
            liblzma-dev \
            autoconf \
            automake \
            libtool \
            cmake \
            zip \
            unzip \
            wget \
            curl \
            openjdk-17-jdk
      
      # Step 5: Install Python packages
      - name: 📥 Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33
          pip install buildozer
          pip install virtualenv
      
      # Step 6: Setup Android SDK (with legacy path fix)
      - name: 📱 Setup Android SDK
        run: |
          ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          
          cd $ANDROID_SDK_ROOT
          
          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          
          # Create proper structure for new SDK
          mkdir -p cmdline-tools/latest
          cp -r cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools/NOTICE.txt cmdline-tools/bin cmdline-tools/lib 2>/dev/null || true
          
          # Create legacy path that Buildozer expects
          mkdir -p tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager $ANDROID_SDK_ROOT/tools/bin/avdmanager
          
          # Accept licenses
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT 2>/dev/null || true
          
          # Install required SDK components
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" 2>/dev/null || true
          
          # Set environment variables
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
      
      # Step 7: Download Android NDK
      - name: 📦 Download Android NDK
        run: |
          NDK_DIR=$HOME/.buildozer/android/platform/android-ndk-r23b
          if [ ! -d "$NDK_DIR" ]; then
            echo "Downloading NDK r23b..."
            cd $HOME/.buildozer/android/platform
            wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
            unzip -q android-ndk-r23b-linux.zip
            rm android-ndk-r23b-linux.zip
          fi
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
      
      # Step 8: Cache SDK and NDK
      - name: 🔧 Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r23b
            ~/.cache/pip
          key: ${{ runner.os }}-android-sdk-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-v3-
      
      # Step 9: Create buildozer.spec
      - name: 📝 Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = My Android App
          package.name = myapp
          package.domain = org.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,json
          version = 1.0.0
          requirements = python3,kivy==2.3.0
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 33
          android.minapi = 21
          android.ndk = 23b
          android.archs = armeabi-v7a
          android.allow_backup = True
          p4a.branch = develop
          
          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF
          
          echo "✅ buildozer.spec created"
          cat buildozer.spec
      
      # Step 10: Build the APK
      - name: 🔨 Build APK
        id: build
        run: |
          BUILD_MODE="${{ github.event.inputs.build_mode || 'debug' }}"
          echo "Building $BUILD_MODE APK..."
          
          if [ "$BUILD_MODE" = "release" ]; then
            keytool -genkey -v \
              -keystore keystore.jks \
              -alias myapp \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass password123 \
              -keypass password123 \
              -dname "CN=Dev" 2>/dev/null || true
            buildozer android release
          else
            buildozer android debug
          fi
          
          # Show results
          echo ""
          echo "Checking for APK..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found in current directory"
          find $HOME -name "*.apk" -type f 2>/dev/null || echo "No APK found in home directory"
          
          # Check bin directory
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK built successfully!"
            ls -lh bin/*.apk
            echo "apk_created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ APK not found in bin/"
            echo "Contents of bin/:"
            ls -la bin/ 2>/dev/null || echo "bin/ directory does not exist"
            echo "apk_created=false" >> $GITHUB_OUTPUT
          fi
      
      # Step 11: Upload APK as artifact
      - name: 📤 Upload APK artifact
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
          retention-days: 30
      
      # Step 12: Build summary
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "============================================"
          echo "           BUILD SUMMARY                     "
          echo "============================================"
          echo "Status: ${{ job.status }}"
          echo "Build Number: ${{ github.run_number }}"
          echo "Timestamp: $(date)"
          echo "============================================"
          
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ SUCCESS - APK created"
            ls -lh bin/*.apk
          else
            echo "❌ No APK found"
          fi
          echo "============================================"
