name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3-dev python3-pip \
            libffi-dev libssl-dev liblzma-dev \
            autoconf automake libtool cmake \
            zip unzip wget curl \
            openjdk-17-jdk
      
      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer virtualenv
      
      - name: Create buildozer.spec (with skip_update and accept_sdk_agreement)
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = My App
          package.name = myapp
          package.domain = org.example
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 30
          android.minapi = 21
          android.ndk = 25b
          android.archs = armeabi-v7a
          android.allow_backup = True
          android.accept_sdk_agreement = True
          android.skip_update = True
          p4a.branch = develop
          
          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF
          
          echo "buildozer.spec created"
          cat buildozer.spec
      
      - name: Pre-accept SDK licenses
        run: |
          # Create SDK license directory
          SDK_LICENSES_DIR=$HOME/.buildozer/android/platform/android-sdk/licenses
          mkdir -p $SDK_LICENSES_DIR
          
          # Pre-accept the Android SDK license
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK_LICENSES_DIR/android-sdk-license
          
          echo "SDK licenses accepted"
      
      - name: Build APK
        id: build
        run: |
          echo "=========================================="
          echo "STARTING BUILD"
          echo "=========================================="
          
          buildozer android debug 2>&1 | tee full_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          echo ""
          echo "Build exit code: $BUILD_EXIT"
          
          # Search for errors
          echo ""
          echo "=== Errors in build log ==="
          grep -i "error\|failed\|aidl" full_build.log | head -20 || echo "No specific errors found"
          
          # Find APK
          echo ""
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          find /home/runner -name "*.apk" -type f 2>/dev/null | head -10
          
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK FOUND!"
            ls -lh bin/*.apk
            echo "apk_created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ No APK in bin/"
            
            # Show relevant log sections
            echo ""
            echo "=== Checking for aidl issues ==="
            grep -A5 -B5 "aidl\|build-tools" full_build.log | head -50
            
            echo "apk_created=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload APK
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
          retention-days: 30
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: full_build.log
          retention-days: 7
      
      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "BUILD SUMMARY"
          echo "============================================"
          echo "Status: ${{ job.status }}"
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK SUCCESSFULLY CREATED"
            ls -lh bin/*.apk
          else
            echo "❌ BUILD FAILED"
          fi
          echo "============================================"
