name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      arch:
        description: 'Android architecture'
        required: true
        default: 'armeabi-v7a'
        type: choice
        options:
          - armeabi-v7a
          - arm64-v8a
          - 'armeabi-v7a arm64-v8a'

jobs:
  build-android:
    name: Build Android APK (${{ github.event.inputs.build_mode || 'debug' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # Step 1: Checkout repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Step 2: Setup Java (without Gradle caching)
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Step 3: Setup Python
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 4: Install system dependencies
      - name: 📦 Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            ccache \
            git \
            zlib1g-dev \
            python3-dev \
            python3-pip \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo6 \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            libbz2-dev \
            libreadline-dev \
            liblzma-dev \
            autoconf \
            automake \
            libtool \
            cmake \
            pkg-config \
            zip \
            unzip \
            curl \
            wget \
            openjdk-17-jdk \
            openjdk-17-jre \
            libc6:i386 \
            libstdc++6:i386 \
            lib32z1 \
            lib32stdc++6
      
      # Step 5: Create swap space for memory-intensive builds
      - name: 💾 Create swap space
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show
          free -h
      
      # Step 6: Install Python packages
      - name: 📥 Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade cython==0.29.33
          pip install --upgrade buildozer
          pip install --upgrade virtualenv
          pip list
      
      # Step 7: Cache Buildozer files
      - name: 🔧 Cache Buildozer globals
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.cache/pip
          key: ${{ runner.os }}-buildozer-v4-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v4-
            ${{ runner.os }}-buildozer-
      
      # Step 8: Set up Android SDK environment
      - name: 📱 Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r23b" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$HOME/.buildozer/android/platform/android-sdk/tools/bin" >> $GITHUB_PATH
          echo "$HOME/.buildozer/android/platform/android-sdk/platform-tools" >> $GITHUB_PATH
      
      # Step 9: Accept Android SDK licenses
      - name: 📜 Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
      
      # Step 10: Create buildozer.spec if missing
      - name: 📝 Verify buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "❌ buildozer.spec not found! Creating default..."
            buildozer init
            
            # Configure buildozer.spec
            sed -i 's/^title = .*/title = My Android App/' buildozer.spec
            sed -i 's/^package.name = .*/package.name = myapp/' buildozer.spec
            sed -i 's/^package.domain = .*/package.domain = org.example/' buildozer.spec
            sed -i 's/^source.dir = .*/source.dir = ./' buildozer.spec
            sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas,json,ttf,txt/' buildozer.spec
            sed -i 's/^version = .*/version = 1.0.0/' buildozer.spec
            sed -i 's/^requirements = .*/requirements = python3,kivy==2.3.0/' buildozer.spec
            sed -i 's/^orientation = .*/orientation = portrait/' buildozer.spec
            sed -i 's/^fullscreen = .*/fullscreen = 0/' buildozer.spec
            sed -i 's/^android.permissions = .*/android.permissions = INTERNET/' buildozer.spec
            sed -i 's/^android.api = .*/android.api = 33/' buildozer.spec
            sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
            sed -i 's/^android.ndk = .*/android.ndk = 23b/' buildozer.spec
            sed -i 's/^android.arch = .*/android.arch = armeabi-v7a/' buildozer.spec
            sed -i 's/^android.allow_backup = .*/android.allow_backup = True/' buildozer.spec
            sed -i 's/^p4a.branch = .*/p4a.branch = develop/' buildozer.spec
            
            # Buildozer settings
            sed -i 's/^log_level = .*/log_level = 2/' buildozer.spec
            sed -i 's/^warn_on_root = .*/warn_on_root = 1/' buildozer.spec
            
            echo "✅ buildozer.spec created successfully"
          else
            echo "✅ buildozer.spec found"
          fi
          
          echo "📄 Current buildozer.spec contents:"
          cat buildozer.spec
      
      # Step 11: Override architecture from manual trigger
      - name: 🎯 Set target architecture
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.arch != ''
        run: |
          ARCH="${{ github.event.inputs.arch }}"
          echo "Setting architecture to: $ARCH"
          sed -i "s/^android.arch = .*/android.arch = $ARCH/" buildozer.spec
          echo "Updated android.arch:"
          grep "^android.arch" buildozer.spec
      
      # Step 12: Build the APK
      - name: 🔨 Build APK
        id: build
        run: |
          BUILD_MODE="${{ github.event.inputs.build_mode || 'debug' }}"
          echo "Building $BUILD_MODE APK..."
          
          if [ "$BUILD_MODE" = "release" ]; then
            # For release builds, generate a keystore
            if [ ! -f keystore.jks ]; then
              echo "Generating temporary keystore..."
              keytool -genkey -v \
                -keystore keystore.jks \
                -alias myapp \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -storepass password123 \
                -keypass password123 \
                -dname "CN=Developer, OU=Dev, O=Company, L=City, ST=State, C=US"
            fi
            buildozer android release
          else
            buildozer android debug
          fi
          
          # Check if APK was created
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK built successfully!"
            ls -lh bin/*.apk
            echo "apk_created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ APK not found!"
            echo "apk_created=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      # Step 13: Generate APK filename
      - name: 📛 Generate APK filename
        id: apk_name
        run: |
          BUILD_DATE=$(date +'%Y%m%d_%H%M%S')
          BUILD_MODE="${{ github.event.inputs.build_mode || 'debug' }}"
          NEW_NAME="${BUILD_MODE}_${BUILD_DATE}_${GITHUB_SHA:0:7}"
          echo "new_name=$NEW_NAME" >> $GITHUB_OUTPUT
      
      # Step 14: Upload APK as artifact
      - name: 📤 Upload APK artifact
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-${{ steps.apk_name.outputs.new_name }}
          path: bin/*.apk
          retention-days: 30
      
      # Step 15: Create GitHub Release (only on push to main/master)
      - name: 🚀 Create Release
        if: steps.build.outputs.apk_created == 'true' && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          name: APK Build - ${{ steps.apk_name.outputs.new_name }}
          tag_name: v${{ github.run_number }}-${{ github.sha }}
          files: bin/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 16: Build summary
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "============================================"
          echo "           BUILD SUMMARY                     "
          echo "============================================"
          echo "Status: ${{ job.status }}"
          echo "Build Number: ${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Event: ${{ github.event_name }}"
          echo "Build Mode: ${{ github.event.inputs.build_mode || 'debug' }}"
          echo "Timestamp: $(date)"
          echo "============================================"
          
          if [ "${{ steps.build.outputs.apk_created }}" = "true" ]; then
            echo "✅ APK BUILD SUCCESSFUL"
            ls -lh bin/*.apk
          else
            echo "❌ BUILD FAILED"
          fi
          echo "============================================"
