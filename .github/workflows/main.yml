name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3-dev python3-pip \
            libffi-dev libssl-dev liblzma-dev \
            autoconf automake libtool cmake \
            zip unzip wget curl \
            openjdk-17-jdk
      
      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer virtualenv
      
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = My App
          package.name = myapp
          package.domain = org.example
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 30
          android.minapi = 21
          android.ndk = 25b
          android.archs = armeabi-v7a
          android.allow_backup = True
          android.accept_sdk_agreement = True
          android.skip_update = False
          p4a.branch = develop
          
          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF
          
          echo "buildozer.spec created"
          cat buildozer.spec
      
      - name: Build APK
        id: build
        run: |
          echo "=========================================="
          echo "STARTING BUILD"
          echo "=========================================="
          
          # Run buildozer with full output
          buildozer android debug 2>&1 | tee full_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          echo ""
          echo "=========================================="
          echo "BUILD COMPLETE - Exit Code: $BUILD_EXIT"
          echo "=========================================="
          
          # Search for the actual error
          echo ""
          echo "=== Searching for errors in build log ==="
          grep -i "error\|failed\|exception\|traceback" full_build.log | head -20 || echo "No obvious errors found"
          
          echo ""
          echo "=== Last 100 lines of build log ==="
          tail -100 full_build.log
          
          echo ""
          echo "=== Searching for APK files ==="
          find / -name "*.apk" -type f 2>/dev/null | head -10
          
          # Check bin directory
          if [ -d bin ]; then
            echo ""
            echo "=== Contents of bin/ ==="
            ls -la bin/
          fi
          
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo ""
            echo "✅ APK FOUND!"
            ls -lh bin/*.apk
            echo "apk_created=true" >> $GITHUB_OUTPUT
            cp bin/*.apk app-debug.apk
          else
            echo ""
            echo "❌ No APK found in bin/"
            echo "apk_created=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload APK
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: |
            bin/*.apk
            app-debug.apk
          retention-days: 30
      
      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: full_build.log
          retention-days: 7
      
      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "BUILD SUMMARY"
          echo "==========================================="
          echo "Job Status: ${{ job.status }}"
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK SUCCESSFULLY CREATED"
            ls -lh bin/*.apk
          else
            echo "❌ NO APK CREATED"
            echo ""
            echo "Download the 'full-build-log' artifact to see what went wrong"
          fi
          echo "============================================"
