name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3-dev python3-pip \
            libffi-dev libssl-dev liblzma-dev \
            autoconf automake libtool cmake \
            zip unzip wget curl \
            openjdk-17-jdk
      
      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer virtualenv
      
      - name: Setup Android SDK manually
        run: |
          ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          
          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          rm commandlinetools-linux-9477386_latest.zip
          
          # Create proper structure
          mkdir -p cmdline-tools
          mv cmdline-tools cmdline-tools-temp 2>/dev/null || true
          mkdir -p cmdline-tools/latest
          if [ -d "cmdline-tools-temp" ]; then
            cp -r cmdline-tools-temp/* cmdline-tools/latest/ 2>/dev/null || true
            rm -rf cmdline-tools-temp
          fi
          
          # Create LEGACY path that Buildozer expects
          mkdir -p tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager $ANDROID_SDK_ROOT/tools/bin/avdmanager
          chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/*
          
          # Accept licenses
          mkdir -p licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > licenses/android-sdk-license
          
          # Install required packages
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            "build-tools;34.0.0" \
            2>/dev/null || true
          
          # Set environment variables
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          
          # Verify setup
          echo ""
          echo "=== Verifying SDK setup ==="
          echo "SDK root: $ANDROID_SDK_ROOT"
          echo ""
          echo "sdkmanager location:"
          find $ANDROID_SDK_ROOT -name "sdkmanager" -type f 2>/dev/null
          echo ""
          echo "build-tools:"
          ls -la $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "build-tools directory missing (will be installed by Buildozer)"
          echo ""
          echo "platforms:"
          ls -la $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "platforms directory missing"
      
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = My App
          package.name = myapp
          package.domain = org.example
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.archs = armeabi-v7a
          android.allow_backup = True
          android.accept_sdk_agreement = True
          android.skip_update = False
          p4a.branch = develop
          
          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF
          
          echo "buildozer.spec created"
          cat buildozer.spec
      
      - name: Build APK
        id: build
        run: |
          echo "=========================================="
          echo "STARTING BUILD"
          echo "=========================================="
          
          buildozer android debug 2>&1 | tee full_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          echo ""
          echo "=========================================="
          echo "BUILD COMPLETE - Exit Code: $BUILD_EXIT"
          echo "=========================================="
          
          # Find APK
          echo ""
          echo "=== Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          find /home/runner -name "*.apk" -type f 2>/dev/null | head -10
          
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo ""
            echo "✅✅✅ APK FOUND! ✅✅✅"
            ls -lh bin/*.apk
            echo "apk_created=true" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "❌ No APK in bin/"
            
            # Show errors
            echo ""
            echo "=== Errors/Warnings ==="
            grep -i "error\|failed\|Warning" full_build.log | tail -20
            
            echo "apk_created=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload APK
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
          retention-days: 30
      
      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: full_build.log
          retention-days: 7
      
      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "BUILD SUMMARY"
          echo "============================================"
          echo "Job Status: ${{ job.status }}"
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅✅✅ APK SUCCESSFULLY CREATED ✅✅✅"
            ls -lh bin/*.apk
          else
            echo "❌ NO APK CREATED"
          fi
          echo "============================================"
