name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git python3-dev python3-pip \
            libffi-dev libssl-dev liblzma-dev \
            autoconf automake libtool cmake \
            zip unzip wget curl \
            openjdk-17-jdk \
            libc6-i386 lib32z1 lib32stdc++6
      
      - name: Install Python packages
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython buildozer virtualenv
      
      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = My App
          package.name = myapp
          package.domain = org.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,json
          version = 1.0
          requirements = python3,kivy==2.3.0
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.archs = armeabi-v7a
          android.allow_backup = True
          p4a.branch = develop
          
          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF
          
          echo "buildozer.spec created:"
          cat buildozer.spec
      
      - name: Build APK
        id: build
        run: |
          echo "Starting Buildozer..."
          echo ""
          
          # Run buildozer and capture all output
          buildozer android debug 2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          echo ""
          echo "=========================================="
          echo "Build exit code: $BUILD_EXIT_CODE"
          echo "=========================================="
          
          # Search for APK files
          echo ""
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null
          find /home/runner -name "*.apk" -type f 2>/dev/null
          
          # Check bin directory
          if [ -d bin ]; then
            echo ""
            echo "Contents of bin/:"
            ls -la bin/
          fi
          
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo ""
            echo "APK found!"
            ls -lh bin/*.apk
            echo "apk_created=true" >> $GITHUB_OUTPUT
            
            # Copy APK to a known location
            cp bin/*.apk myapp.apk
          else
            echo ""
            echo "No APK found in bin/"
            
            # Show last 100 lines of build log for debugging
            echo ""
            echo "Last 100 lines of build log:"
            tail -100 build.log
          fi
      
      - name: Upload APK
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: |
            bin/*.apk
            myapp.apk
          retention-days: 30
      
      - name: Upload build log (for debugging)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
