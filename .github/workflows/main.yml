name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      arch:
        description: 'Android architecture'
        required: true
        default: 'armeabi-v7a'
        type: choice
        options:
          - armeabi-v7a
          - arm64-v8a
          - 'armeabi-v7a arm64-v8a'

jobs:
  build-android:
    name: Build Android APK (${{ github.event.inputs.build_mode || 'debug' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # Step 1: Checkout repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Step 2: Setup Java
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Step 3: Setup Python
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 4: Install system dependencies
      - name: 📦 Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            ccache \
            git \
            zlib1g-dev \
            python3-dev \
            python3-pip \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            libbz2-dev \
            libreadline-dev \
            liblzma-dev \
            autoconf \
            automake \
            libtool \
            cmake \
            pkg-config \
            zip \
            unzip \
            curl \
            wget \
            openjdk-17-jdk \
            libc6:i386 \
            libstdc++6:i386 \
            lib32z1 \
            lib32stdc++6
      
      # Step 5: Create swap space
      - name: 💾 Create swap space
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
      
      # Step 6: Install Python packages
      - name: 📥 Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade cython==0.29.33
          pip install --upgrade buildozer
          pip install --upgrade virtualenv
          pip list
      
      # Step 7: Setup Android SDK manually
      - name: 📱 Setup Android SDK
        run: |
          # Create directories
          mkdir -p $HOME/.buildozer/android/platform/android-sdk
          mkdir -p $HOME/.buildozer/android/platform
          
          # Download Android SDK command-line tools
          cd $HOME/.buildozer/android/platform/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          
          # Move to proper location
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools/latest/cmdline-tools
          
          # Set environment variables
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          
          # Accept licenses
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT
          
          # Install required SDK components
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0"
          
          # Set environment variables for subsequent steps
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r23b" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
      
      # Step 8: Download Android NDK
      - name: 📦 Download Android NDK
        run: |
          cd $HOME/.buildozer/android/platform
          if [ ! -d "android-ndk-r23b" ]; then
            echo "Downloading NDK r23b..."
            wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
            unzip -q android-ndk-r23b-linux.zip
            rm android-ndk-r23b-linux.zip
          fi
          echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r23b" >> $GITHUB_ENV
      
      # Step 9: Cache SDK and NDK
      - name: 🔧 Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r23b
            ~/.cache/pip
          key: ${{ runner.os }}-android-sdk-ndk-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-ndk-
      
      # Step 10: Create buildozer.spec if missing
      - name: 📝 Verify buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "❌ buildozer.spec not found! Creating..."
            buildozer init
            
            # Update buildozer.spec with correct settings
            cat > buildozer.spec << 'EOF'
          [app]
          title = My Android App
          package.name = myapp
          package.domain = org.example
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,json
          version = 1.0.0
          requirements = python3,kivy==2.3.0
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 33
          android.minapi = 21
          android.ndk = 23b
          android.archs = armeabi-v7a
          android.allow_backup = True
          p4a.branch = develop
          
          [buildozer]
          log_level = 2
          warn_on_root = 1
          EOF
            
            echo "✅ buildozer.spec created"
          else
            # Fix deprecated android.arch to android.archs
            sed -i 's/^android.arch = /android.archs = /' buildozer.spec
            echo "✅ buildozer.spec updated"
          fi
          
          echo "📄 buildozer.spec contents:"
          cat buildozer.spec
      
      # Step 11: Override architecture from manual trigger
      - name: 🎯 Set target architecture
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.arch != ''
        run: |
          ARCH="${{ github.event.inputs.arch }}"
          echo "Setting architecture to: $ARCH"
          sed -i "s/^android.archs = .*/android.archs = $ARCH/" buildozer.spec
          echo "Updated android.archs:"
          grep "^android.archs" buildozer.spec
      
      # Step 12: Build the APK
      - name: 🔨 Build APK
        id: build
        run: |
          BUILD_MODE="${{ github.event.inputs.build_mode || 'debug' }}"
          echo "Building $BUILD_MODE APK..."
          
          if [ "$BUILD_MODE" = "release" ]; then
            if [ ! -f keystore.jks ]; then
              keytool -genkey -v \
                -keystore keystore.jks \
                -alias myapp \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -storepass password123 \
                -keypass password123 \
                -dname "CN=Dev, OU=Dev, O=Company, L=City, ST=State, C=US"
            fi
            buildozer android release
          else
            buildozer android debug
          fi
          
          # Check if APK was created
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK built successfully!"
            ls -lh bin/*.apk
            echo "apk_created=true" >> $GITHUB_OUTPUT
          else
            echo "❌ APK not found!"
            echo "apk_created=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      # Step 13: Upload APK as artifact
      - name: 📤 Upload APK artifact
        if: steps.build.outputs.apk_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
      
      # Step 14: Build summary
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "============================================"
          echo "           BUILD SUMMARY                     "
          echo "============================================"
          echo "Status: ${{ job.status }}"
          echo "Build Number: ${{ github.run_number }}"
          echo "Timestamp: $(date)"
          echo "============================================"
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK BUILD SUCCESSFUL"
            ls -lh bin/*.apk
          else
            echo "❌ BUILD FAILED"
          fi
          echo "============================================"
