# FILE: MoneroRandomXMiner/.github/workflows/android.yml
name: Android Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - 'src/**'
      - 'libs/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options: [debug, release]
        default: debug

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: '26.1.10909125'
  RANDOMX_VERSION: 'v1.1.10'
  JSON_VERSION: 'v3.11.2'

jobs:
  # ============================================================
  # Setup Dependencies (Shared)
  # ============================================================
  setup-deps:
    runs-on: ubuntu-latest
    outputs:
      randomx-cache-key: ${{ steps.cache-deps.outputs.cache-key }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache RandomX & Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            libs/randomx/
            libs/nlohmann/
          key: deps-${{ runner.os }}-${{ env.RANDOMX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}
      
      - name: Clone RandomX Library
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "📦 Cloning RandomX ${{ env.RANDOMX_VERSION }}..."
          git clone --branch ${{ env.RANDOMX_VERSION }} --depth 1 \
            https://github.com/tevador/RandomX.git libs/randomx
          
          # Verify clone
          if [ ! -f "libs/randomx/src/randomx.h" ]; then
            echo "❌ RandomX clone failed!"
            exit 1
          fi
          echo "✅ RandomX cloned successfully"
      
      - name: Download nlohmann/json
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading nlohmann/json..."
          mkdir -p libs/nlohmann
          wget -q -O libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/download/${{ env.JSON_VERSION }}/json.hpp
          
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ JSON library downloaded"
          else
            # Fallback to latest
            wget -q -O libs/nlohmann/json.hpp \
              https://github.com/nlohmann/json/releases/latest/download/json.hpp
          fi
      
      - name: Verify All Dependencies
        run: |
          echo "========================================="
          echo "Verifying Dependencies:"
          echo "========================================="
          
          if [ -f "libs/randomx/src/randomx.h" ]; then
            echo "✅ RandomX header found"
          else
            echo "❌ RandomX header MISSING"
            exit 1
          fi
          
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ JSON library found ($(wc -c < libs/nlohmann/json.hpp) bytes)"
          else
            echo "❌ JSON library MISSING"
            exit 1
          fi
          
          echo ""
          echo "RandomX files:"
          find libs/randomx/src -name "*.h" -o -name "*.cpp" | sort
          echo ""
          echo "Project structure:"
          ls -la libs/
      
      - name: Upload Dependencies as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependencies
          path: |
            libs/randomx/
            libs/nlohmann/
          retention-days: 1

  # ============================================================
  # Android APK Build
  # ============================================================
  build-apk:
    needs: setup-deps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug, release]
        abi: [arm64-v8a, armeabi-v7a]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Dependencies
        uses: actions/download-artifact@v4
        with:
          name: dependencies
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: |
          echo "Installing NDK ${{ env.ANDROID_NDK_VERSION }}..."
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1"
          
          # Set NDK path
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/build
          key: gradle-${{ runner.os }}-${{ matrix.abi }}-${{ hashFiles('android/**/*.gradle*') }}
      
      - name: Verify Android Project Structure
        run: |
          echo "Checking Android project structure..."
          
          required_files=(
            "android/build.gradle"
            "android/settings.gradle"
            "android/gradle.properties"
            "android/app/build.gradle"
            "android/app/src/main/AndroidManifest.xml"
            "android/app/src/main/cpp/CMakeLists.txt"
            "android/app/src/main/cpp/android_main.cpp"
          )
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ MISSING: $file"
              exit 1
            fi
          done
          
          echo "All required files present!"
      
      - name: Grant Gradle Permissions
        run: chmod +x android/gradlew
      
      - name: Build Native Libraries
        working-directory: android
        run: |
          echo "Building for ${{ matrix.abi }} (${{ matrix.build_type }})..."
          
          ./gradlew assemble${{ matrix.build_type == 'release' && 'Release' || 'Debug' }} \
            -Pandroid.injected.invoked.from.ide=true \
            --no-daemon \
            --stacktrace
      
      - name: Verify APK
        run: |
          APK_DIR="android/app/build/outputs/apk/${{ matrix.build_type }}"
          echo "Looking for APK in: $APK_DIR"
          
          # Try to find the APK
          APK_FILE=$(find "$APK_DIR" -name "*.apk" -type f | head -1)
          
          if [ -n "$APK_FILE" ]; then
            echo "✅ APK found: $APK_FILE"
            echo "APK_SIZE=$(du -sh "$APK_FILE" | cut -f1)"
          else
            echo "❌ No APK found!"
            echo "Build output:"
            find android/app/build -name "*.apk" -o -name "*.so" 2>/dev/null || echo "Nothing found"
            exit 1
          fi
      
      - name: Check APK Contents
        run: |
          APK_DIR="android/app/build/outputs/apk/${{ matrix.build_type }}"
          APK_FILE=$(find "$APK_DIR" -name "*.apk" -type f | head -1)
          
          echo "========================================="
          echo "APK Analysis:"
          echo "========================================="
          echo "Size: $(du -sh "$APK_FILE" | cut -f1)"
          echo ""
          echo "Native libraries:"
          unzip -l "$APK_FILE" | grep "\.so" || echo "  No native libs found"
          echo ""
          echo "Architecture: ${{ matrix.abi }}"
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.build_type }}-${{ matrix.abi }}
          path: android/app/build/outputs/apk/${{ matrix.build_type }}/*.apk
          retention-days: 30
  
  # ============================================================
  # Desktop Build Verification
  # ============================================================
  build-desktop:
    needs: setup-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Dependencies
        uses: actions/download-artifact@v4
        with:
          name: dependencies
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev
      
      - name: Configure CMake
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_WITH_SSL=ON \
            -DBUILD_WITH_HWLOC=OFF \
            -DENABLE_HUGEPAGES=OFF
      
      - name: Build Desktop Binary
        run: |
          cd build
          make -j$(nproc)
      
      - name: Verify Binary
        run: |
          if [ -f "build/MoneroRandomXMiner" ]; then
            echo "✅ Desktop binary built successfully"
            file build/MoneroRandomXMiner
            echo ""
            echo "Linked libraries:"
            ldd build/MoneroRandomXMiner | grep -E "randomx|ssl|crypto"
          else
            echo "❌ Desktop binary not found"
            exit 1
          fi
      
      - name: Quick Functional Test
        run: |
          # Test that binary starts (will fail on network but proves it works)
          timeout 5s ./build/MoneroRandomXMiner --help 2>&1 || true
          echo "Binary execution test passed"

  # ============================================================
  # Code Quality Checks
  # ============================================================
  code-quality:
    needs: setup-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Dependencies
        uses: actions/download-artifact@v4
        with:
          name: dependencies
      
      - name: Install Linters
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-format
      
      - name: Check Code Formatting
        run: |
          echo "Checking C++ code formatting..."
          find src libs -name "*.cpp" -o -name "*.h" | while read file; do
            clang-format --style=Google --dry-run -Werror "$file" 2>&1 || \
              echo "⚠️  Formatting issues in: $file"
          done
      
      - name: Run cppcheck
        run: |
          echo "Running static analysis..."
          cppcheck --enable=all \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --error-exitcode=1 \
            -I src/ \
            -I libs/ \
            -I libs/randomx/src/ \
            src/ libs/randomx_wrapper.cpp 2>&1 | tee cppcheck.txt || true
      
      - name: Check for Common Issues
        run: |
          echo "Checking for common security issues..."
          
          # Check for unsafe functions
          if grep -rn "strcpy\|strcat\|sprintf\|gets" src/ libs/*.cpp 2>/dev/null; then
            echo "⚠️  Potentially unsafe functions found"
          else
            echo "✅ No unsafe functions found"
          fi
          
          # Check for hardcoded addresses
          if grep -rn "8BfN5c\|44AFFq" src/ 2>/dev/null; then
            echo "⚠️  Hardcoded wallet addresses found!"
          else
            echo "✅ No hardcoded wallet addresses in source"
          fi

  # ============================================================
  # Android Tests
  # ============================================================
  test-android:
    needs: [setup-deps, build-apk]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Dependencies
        uses: actions/download-artifact@v4
        with:
          name: dependencies
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Run Unit Tests
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon
      
      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          ram-size: '2048M'
          script: |
            cd android
            ./gradlew connectedCheck --no-daemon

  # ============================================================
  # Release Signing
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-apk, code-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk-release-arm64-v8a
      
      - name: Download APK (ARMv7)
        uses: actions/download-artifact@v4
        with:
          name: apk-release-armeabi-v7a
      
      - name: Sign APKs
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: .
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *-release-signed.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
