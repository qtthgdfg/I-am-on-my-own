# FILE: MoneroRandomXMiner/.github/workflows/android.yml
name: Android Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - 'src/**'
      - 'libs/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: '26.1.10909125'
  RANDOMX_VERSION: 'v1.1.10'
  GRADLE_VERSION: '8.5'

jobs:
  # ============================================================
  # Build Everything
  # ============================================================
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # ============================================================
      # Clone RandomX
      # ============================================================
      - name: Cache RandomX
        id: cache-randomx
        uses: actions/cache@v4
        with:
          path: libs/randomx
          key: randomx-${{ env.RANDOMX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}
      
      - name: Clone RandomX
        if: steps.cache-randomx.outputs.cache-hit != 'true'
        run: |
          echo "📦 Cloning RandomX ${{ env.RANDOMX_VERSION }}..."
          mkdir -p libs
          git clone --branch ${{ env.RANDOMX_VERSION }} --depth 1 \
            https://github.com/tevador/RandomX.git libs/randomx
          echo "✅ RandomX cloned"
      
      # ============================================================
      # Download JSON Library
      # ============================================================
      - name: Cache JSON Library
        id: cache-json
        uses: actions/cache@v4
        with:
          path: libs/nlohmann
          key: nlohmann-json-${{ hashFiles('CMakeLists.txt') }}
      
      - name: Download nlohmann/json
        if: steps.cache-json.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading nlohmann/json..."
          mkdir -p libs/nlohmann
          wget -q -O libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp 2>/dev/null || \
          curl -sL -o libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp
          echo "✅ JSON downloaded"
      
      # ============================================================
      # Verify Dependencies
      # ============================================================
      - name: Verify Dependencies
        run: |
          echo "========================================="
          echo "Checking dependencies..."
          echo "========================================="
          
          if [ -f "libs/randomx/src/randomx.h" ]; then
            echo "✅ RandomX found"
          else
            echo "❌ RandomX missing at libs/randomx/src/randomx.h"
            find . -name "randomx.h" 2>/dev/null || echo "No randomx.h anywhere"
            exit 1
          fi
          
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ JSON library found"
          else
            echo "❌ JSON missing at libs/nlohmann/json.hpp"
            exit 1
          fi
      
      # ============================================================
      # Setup Java
      # ============================================================
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # ============================================================
      # Setup Android SDK
      # ============================================================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK and CMake
        run: |
          echo "Installing NDK ${{ env.ANDROID_NDK_VERSION }}..."
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1" 2>/dev/null || true
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV
      
      # ============================================================
      # Setup Gradle Wrapper (Auto-download if missing)
      # ============================================================
      - name: Setup Gradle Wrapper
        working-directory: android
        run: |
          echo "========================================="
          echo "Setting up Gradle ${{ env.GRADLE_VERSION }}..."
          echo "========================================="
          
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar if missing
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading gradle-wrapper.jar..."
            wget -q -O gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v${{ env.GRADLE_VERSION }}.0/gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || \
            curl -sL -o gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v${{ env.GRADLE_VERSION }}.0/gradle/wrapper/gradle-wrapper.jar"
            
            if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
              echo "✅ gradle-wrapper.jar downloaded ($(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes)"
            else
              echo "❌ Failed to download gradle-wrapper.jar"
              exit 1
            fi
          else
            echo "✅ gradle-wrapper.jar exists"
          fi
          
          # Create gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << PROPS
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\\://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
           PROPS
          echo "✅ gradle-wrapper.properties created"
          
          # Ensure gradlew exists and is executable
          if [ ! -f "gradlew" ]; then
            echo "Creating gradlew script..."
            cat > gradlew << 'GRADLEW'
#!/bin/sh
##############################################################################
## Gradle start up script
##############################################################################
 
      # ============================================================
      # Cache Gradle Downloads
      # ============================================================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ env.GRADLE_VERSION }}-${{ hashFiles('android/**/*.gradle*') }}
      
      # ============================================================
      # Build APK
      # ============================================================
      - name: Build APK for ${{ matrix.abi }}
        id: build
        working-directory: android
        run: |
          echo "========================================="
          echo "Building APK..."
          echo "  ABI: ${{ matrix.abi }}"
          echo "  NDK: ${{ env.ANDROID_NDK_VERSION }}"
          echo "  Gradle: ${{ env.GRADLE_VERSION }}"
          echo "========================================="
          
          # Create log directory
          LOG_DIR="../build-logs"
          mkdir -p "$LOG_DIR"
          LOG_FILE="$LOG_DIR/build-${{ matrix.abi }}.log"
          
          # Build with full logging
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            2>&1 | tee "$LOG_FILE"
          
          BUILD_RESULT=${PIPESTATUS[0]}
          
          # Log build result
          echo "" >> "$LOG_FILE"
          echo "========================================" >> "$LOG_FILE"
          echo "BUILD RESULT: $BUILD_RESULT" >> "$LOG_FILE"
          echo "TIMESTAMP: $(date)" >> "$LOG_FILE"
          echo "ABI: ${{ matrix.abi }}" >> "$LOG_FILE"
          echo "========================================" >> "$LOG_FILE"
          
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "❌ Build failed with exit code $BUILD_RESULT"
            exit $BUILD_RESULT
          fi
          
          echo "✅ Build successful"
      
      # ============================================================
      # Collect Build Info (always runs)
      # ============================================================
      - name: Collect Build Information
        if: always()
        run: |
          INFO_DIR="build-info/${{ matrix.abi }}"
          mkdir -p "$INFO_DIR"
          
          # System info
          echo "ABI: ${{ matrix.abi }}" > "$INFO_DIR/system.txt"
          echo "NDK: ${{ env.ANDROID_NDK_VERSION }}" >> "$INFO_DIR/system.txt"
          echo "Gradle: ${{ env.GRADLE_VERSION }}" >> "$INFO_DIR/system.txt"
          echo "Java: $(java -version 2>&1 | head -1)" >> "$INFO_DIR/system.txt"
          echo "Date: $(date)" >> "$INFO_DIR/system.txt"
          
          # Dependency info
          echo "RandomX: ${{ env.RANDOMX_VERSION }}" > "$INFO_DIR/dependencies.txt"
          echo "RandomX path: $(find . -name randomx.h 2>/dev/null | head -1)" >> "$INFO_DIR/dependencies.txt"
          echo "JSON path: $(find . -name json.hpp 2>/dev/null | head -1)" >> "$INFO_DIR/dependencies.txt"
          
          # Build output info
          if [ -d "android/app/build/outputs" ]; then
            find android/app/build/outputs -type f -name "*.apk" -o -name "*.so" > "$INFO_DIR/build_output.txt" 2>/dev/null
          fi
      
      # ============================================================
      # Verify APK
      # ============================================================
      - name: Verify APK
        run: |
          echo "========================================="
          echo "Verifying APK..."
          echo "========================================="
          
          APK_DIR="android/app/build/outputs/apk/debug"
          APK_FILE=$(find "$APK_DIR" -name "*.apk" -type f 2>/dev/null | head -1)
          
          if [ -n "$APK_FILE" ]; then
            echo "✅ APK: $APK_FILE"
            echo "   Size: $(du -sh "$APK_FILE" | cut -f1)"
            
            # Check for native libs
            echo ""
            echo "Native libraries:"
            unzip -l "$APK_FILE" 2>/dev/null | grep "\.so" | awk '{print "   " $4 " (" $1 " bytes)"}'
          else
            echo "❌ No APK found!"
            find android/app/build -name "*.apk" 2>/dev/null || echo "No APK files anywhere"
          fi
      
      # ============================================================
      # Upload APK (on success)
      # ============================================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
      
      # ============================================================
      # Upload Build Log (always)
      # ============================================================
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.abi }}
          path: build-logs/build-${{ matrix.abi }}.log
          retention-days: 7
      
      # ============================================================
      # Upload Build Info (always)
      # ============================================================
      - name: Upload Build Info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-info-${{ matrix.abi }}
          path: build-info/${{ matrix.abi }}/
          retention-days: 7

  # ============================================================
  # Combine All Logs (runs after all builds complete)
  # ============================================================
  combine-logs:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download ARM64 Log
        uses: actions/download-artifact@v4
        with:
          name: build-log-arm64-v8a
          path: logs/
        continue-on-error: true
      
      - name: Download ARMv7 Log
        uses: actions/download-artifact@v4
        with:
          name: build-log-armeabi-v7a
          path: logs/
        continue-on-error: true
      
      - name: Download ARM64 Info
        uses: actions/download-artifact@v4
        with:
          name: build-info-arm64-v8a
          path: logs/info-arm64/
        continue-on-error: true
      
      - name: Download ARMv7 Info
        uses: actions/download-artifact@v4
        with:
          name: build-info-armeabi-v7a
          path: logs/info-armv7/
        continue-on-error: true
      
      - name: Combine All Logs into Single File
        run: |
          echo "========================================="
          echo "Combining all build logs..."
          echo "========================================="
          
          COMBINED="combined-build-log.txt"
          
          {
            echo "==========================================================="
            echo "MONERO RANDOMX MINER - COMBINED BUILD LOG"
            echo "==========================================================="
            echo ""
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Commit: ${{ github.sha }}"
            echo "Workflow: ${{ github.workflow }}"
            echo "Run ID: ${{ github.run_id }}"
            echo "Date: $(date)"
            echo ""
            echo "==========================================================="
            echo ""
            
            # Add each log
            for logfile in logs/build-*.log; do
              if [ -f "$logfile" ]; then
                ABI=$(echo "$logfile" | sed 's/.*build-//' | sed 's/\.log//')
                echo "==========================================================="
                echo "BUILD LOG: $ABI"
                echo "==========================================================="
                cat "$logfile"
                echo ""
                echo ""
              fi
            done
            
            # Add info files
            for infofile in logs/info-*/system.txt; do
              if [ -f "$infofile" ]; then
                echo "==========================================================="
                echo "BUILD INFO: $(dirname "$infofile" | xargs basename)"
                echo "==========================================================="
                cat "$infofile"
                echo ""
              fi
            done
            
            # Summary
            echo "==========================================================="
            echo "BUILD SUMMARY"
            echo "==========================================================="
            
            # Count errors
            TOTAL_ERRORS=$(grep -ci "error\|failed\|failure" logs/build-*.log 2>/dev/null || echo "0")
            echo "Total errors/warnings found: $TOTAL_ERRORS"
            
            # Check for APK existence
            if ls logs/../apk-* 2>/dev/null; then
              echo "APK Build: SUCCESS"
            else
              echo "APK Build: FAILED (check logs above)"
            fi
            
            echo ""
            echo "==========================================================="
            echo "END OF COMBINED LOG"
            echo "==========================================================="
            
          } > "$COMBINED"
          
          echo "✅ Combined log created: $COMBINED"
          echo "   Size: $(wc -c < $COMBINED) bytes"
          echo "   Lines: $(wc -l < $COMBINED)"
      
      - name: Upload Combined Log
        uses: actions/upload-artifact@v4
        with:
          name: combined-build-log
          path: combined-build-log.txt
          retention-days: 30
      
      - name: Print Log Summary
        run: |
          echo ""
          echo "========================================="
          echo "BUILD LOG SUMMARY"
          echo "========================================="
          
          if [ -f "combined-build-log.txt" ]; then
            echo ""
            echo "🔴 Errors found:"
            grep -i "error\|failed\|failure" combined-build-log.txt | head -20 || echo "  None found"
            
            echo ""
            echo "⚠️ Warnings found:"
            grep -i "warning" combined-build-log.txt | head -10 || echo "  None found"
            
            echo ""
            echo "📦 APK Status:"
            grep -A2 "APK Build:" combined-build-log.txt || echo "  Unknown"
          fi

  # ============================================================
  # Release (manual trigger via tag)
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, combine-logs]
    runs-on: ubuntu-latest
    steps:
      - name: Download ARM64 APK
        uses: actions/download-artifact@v4
        with:
          name: apk-arm64-v8a
      
      - name: Download ARMv7 APK
        uses: actions/download-artifact@v4
        with:
          name: apk-armeabi-v7a
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
