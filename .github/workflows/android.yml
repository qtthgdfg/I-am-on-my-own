# FILE: MoneroRandomXMiner/.github/workflows/android.yml
name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: '26.1.10909125'
  RANDOMX_VERSION: 'v1.1.10'
  GRADLE_VERSION: '8.5'

jobs:
  # ============================================================
  # STEP 1: Prepare dependencies
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            libs/randomx/
            libs/nlohmann/
          key: deps-v6-${{ env.RANDOMX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}
      
      - name: Clone RandomX
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "📦 Cloning RandomX..."
          mkdir -p libs
          git clone --depth 1 --branch ${{ env.RANDOMX_VERSION }} \
            https://github.com/tevador/RandomX.git libs/randomx
          test -f "libs/randomx/src/randomx.h" || { echo "❌ RandomX clone failed"; exit 1; }
          echo "✅ RandomX cloned"
      
      - name: Download JSON library
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading JSON library..."
          mkdir -p libs/nlohmann
          wget -q -O libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp || \
          curl -fsSL -o libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp
          test -f "libs/nlohmann/json.hpp" || { echo "❌ JSON download failed"; exit 1; }
          echo "✅ JSON downloaded"
      
      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: deps
          path: |
            libs/randomx/
            libs/nlohmann/
          retention-days: 1

  # ============================================================
  # STEP 2: Build APK
  # ============================================================
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: deps
          path: libs/
      
      - name: Fix dependency paths
        run: |
          [ -d "libs/randomx/randomx" ] && { cp -r libs/randomx/randomx/* libs/randomx/; rm -rf libs/randomx/randomx; }
          [ -f "libs/json.hpp" ] && { mkdir -p libs/nlohmann; mv libs/json.hpp libs/nlohmann/; }
          [ -d "randomx" ] && { mv randomx libs/; }
          [ -d "nlohmann" ] && { mv nlohmann libs/; }
          test -f "libs/randomx/src/randomx.h" || { echo "❌ RandomX missing"; exit 1; }
          test -f "libs/nlohmann/json.hpp" || { echo "❌ JSON missing"; exit 1; }
          echo "✅ Dependencies OK"
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1" 2>/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV
      
      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            wget -q -O gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v${{ env.GRADLE_VERSION }}.0/gradle/wrapper/gradle-wrapper.jar"
          fi
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
          echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          echo "✅ Gradle wrapper ready"
      
      - name: Verify structure
        run: |
          for file in "libs/randomx/src/randomx.h" "libs/nlohmann/json.hpp" "android/build.gradle" "android/app/build.gradle" "android/app/src/main/AndroidManifest.xml" "android/app/src/main/cpp/CMakeLists.txt" "android/app/src/main/cpp/android_main.cpp"; do
            [ -f "$file" ] && echo "  ✅ $file" || { echo "  ❌ MISSING: $file"; exit 1; }
          done
          echo "✅ All files present"
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ env.GRADLE_VERSION }}-${{ matrix.abi }}
      
      - name: Build APK
        id: build
        working-directory: android
        run: |
          echo "BUILD: ${{ matrix.abi }} - $(date)"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../build-${{ matrix.abi }}.log
          RESULT=${PIPESTATUS[0]}
          echo "$RESULT" > ../build-status-${{ matrix.abi }}.txt
          if [ $RESULT -eq 0 ]; then
            echo "✅ BUILD SUCCESSFUL"
          else
            echo "❌ BUILD FAILED (exit: $RESULT)"
            tail -40 ../build-${{ matrix.abi }}.log
            exit 1
          fi
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.abi }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.abi }}
          path: |
            build-${{ matrix.abi }}.log
            build-status-${{ matrix.abi }}.txt
          retention-days: 7

  # ============================================================
  # STEP 3: Combine logs
  # ============================================================
  collect-logs:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download arm64 log
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: build-log-arm64-v8a
          path: logs/arm64/
      
      - name: Download armv7 log
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: build-log-armeabi-v7a
          path: logs/armv7/
      
      - name: Create combined log
        run: |
          cat > combined-build.log << 'HEADER'
===========================================================
MONERO RANDOMX MINER - COMBINED BUILD LOG
===========================================================
HEADER
          echo "Repository: ${{ github.repository }}" >> combined-build.log
          echo "Branch: ${{ github.ref_name }}" >> combined-build.log
          echo "Commit: ${{ github.sha }}" >> combined-build.log
          echo "Run ID: ${{ github.run_id }}" >> combined-build.log
          echo "Date: $(date -u)" >> combined-build.log
          echo "" >> combined-build.log
          
          # Arm64
          echo "===========================================================" >> combined-build.log
          echo "BUILD LOG: arm64-v8a" >> combined-build.log
          echo "===========================================================" >> combined-build.log
          if [ -f "logs/arm64/build-arm64-v8a.log" ]; then
            cat logs/arm64/build-arm64-v8a.log >> combined-build.log
          else
            echo "(No arm64-v8a build log)" >> combined-build.log
          fi
          echo "" >> combined-build.log
          
          # Armv7
          echo "===========================================================" >> combined-build.log
          echo "BUILD LOG: armeabi-v7a" >> combined-build.log
          echo "===========================================================" >> combined-build.log
          if [ -f "logs/armv7/build-armeabi-v7a.log" ]; then
            cat logs/armv7/build-armeabi-v7a.log >> combined-build.log
          else
            echo "(No armeabi-v7a build log)" >> combined-build.log
          fi
          echo "" >> combined-build.log
          
          # Summary
          echo "===========================================================" >> combined-build.log
          echo "BUILD SUMMARY" >> combined-build.log
          echo "===========================================================" >> combined-build.log
          if grep -q "BUILD SUCCESSFUL" combined-build.log 2>/dev/null; then
            echo "Status: At least one build succeeded" >> combined-build.log
          else
            echo "Status: All builds failed - check logs above" >> combined-build.log
          fi
          echo "" >> combined-build.log
          echo "===========================================================" >> combined-build.log
          echo "END OF COMBINED LOG" >> combined-build.log
          echo "===========================================================" >> combined-build.log
      
      - name: Upload combined log
        uses: actions/upload-artifact@v4
        with:
          name: combined-build-log
          path: combined-build.log
          retention-days: 30

  # ============================================================
  # STEP 4: Release (on version tags)
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download arm64 APK
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: apk-arm64-v8a
          path: apks/
      
      - name: Download armv7 APK
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: apk-armeabi-v7a
          path: apks/
      
      - name: Download combined log
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: combined-build-log
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apks/**/*.apk
            combined-build.log
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
