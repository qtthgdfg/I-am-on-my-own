# FILE: MoneroRandomXMiner/.github/workflows/android.yml
name: Android Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - 'src/**'
      - 'libs/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options: [debug, release]
        default: debug

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: '26.1.10909125'
  RANDOMX_VERSION: 'v1.1.10'

jobs:
  # ============================================================
  # Setup Dependencies (Shared)
  # ============================================================
  setup-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache RandomX & Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            libs/randomx/
            libs/nlohmann/
          key: deps-${{ runner.os }}-randomx-${{ env.RANDOMX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}
      
      - name: Clone RandomX Library
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "📦 Cloning RandomX ${{ env.RANDOMX_VERSION }}..."
          git clone --branch ${{ env.RANDOMX_VERSION }} --depth 1 \
            https://github.com/tevador/RandomX.git libs/randomx
          
          # Verify clone
          if [ ! -f "libs/randomx/src/randomx.h" ]; then
            echo "❌ RandomX clone failed!"
            exit 1
          fi
          echo "✅ RandomX cloned successfully"
      
      - name: Download nlohmann/json
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading nlohmann/json..."
          mkdir -p libs/nlohmann
          
          # nlohmann/json releases use tags like v3.11.3, not v3.11.2
          # Use latest release for compatibility
          wget -q -O libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp || \
          wget -q -O libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp
          
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ JSON library downloaded ($(wc -c < libs/nlohmann/json.hpp) bytes)"
          else
            echo "❌ Failed to download JSON library"
            exit 1
          fi
      
      - name: Verify All Dependencies
        run: |
          echo "========================================="
          echo "Verifying Dependencies:"
          echo "========================================="
          
          # Check RandomX
          if [ -f "libs/randomx/src/randomx.h" ]; then
            echo "✅ RandomX header found"
          else
            echo "❌ RandomX header MISSING at libs/randomx/src/randomx.h"
            echo "Contents of libs/randomx/:"
            ls -la libs/randomx/ 2>/dev/null || echo "Directory doesn't exist"
            exit 1
          fi
          
          # Check JSON
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ JSON library found ($(wc -c < libs/nlohmann/json.hpp) bytes)"
          else
            echo "❌ JSON library MISSING at libs/nlohmann/json.hpp"
            ls -la libs/nlohmann/ 2>/dev/null || echo "Directory doesn't exist"
            exit 1
          fi
          
          echo ""
          echo "Dependency tree:"
          echo "libs/"
          find libs -type f -name "*.h" -o -name "*.hpp" | head -20
      
      - name: Upload Dependencies as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependencies
          path: |
            libs/randomx/
            libs/nlohmann/
          retention-days: 1

  # ============================================================
  # Android APK Build
  # ============================================================
  build-apk:
    needs: setup-deps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug]
        abi: [arm64-v8a, armeabi-v7a]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Dependencies
        uses: actions/download-artifact@v4
        with:
          name: dependencies
      
      - name: Verify Dependencies After Download
        run: |
          echo "Checking downloaded dependencies..."
          
          if [ -f "libs/randomx/src/randomx.h" ]; then
            echo "✅ RandomX present"
          else
            echo "❌ RandomX NOT FOUND after download!"
            echo "Current directory contents:"
            ls -la
            ls -la libs/ 2>/dev/null || echo "libs/ doesn't exist"
            exit 1
          fi
          
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ JSON library present"
          else
            echo "❌ JSON library NOT FOUND after download!"
            exit 1
          fi
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK and CMake
        run: |
          echo "Installing NDK ${{ env.ANDROID_NDK_VERSION }}..."
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1" 2>/dev/null || true
          
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV
          echo "NDK installed at: $ANDROID_NDK_HOME"
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/build
          key: gradle-${{ runner.os }}-${{ matrix.abi }}-${{ hashFiles('android/**/*.gradle*') }}
      
      - name: Verify Android Project Structure
        run: |
          echo "Checking Android project structure..."
          
          required_files=(
            "android/build.gradle"
            "android/settings.gradle"
            "android/gradle.properties"
            "android/app/build.gradle"
            "android/app/src/main/AndroidManifest.xml"
            "android/app/src/main/cpp/CMakeLists.txt"
            "android/app/src/main/cpp/android_main.cpp"
          )
          
          missing=false
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ MISSING: $file"
              missing=true
            fi
          done
          
          if [ "$missing" = true ]; then
            echo ""
            echo "Current directory structure:"
            find . -type f -name "*.gradle" -o -name "*.xml" -o -name "*.cpp" | sort
            exit 1
          fi
          
          echo "All required files present!"
      
      - name: Grant Gradle Permissions
        run: chmod +x android/gradlew
      
      - name: Build with Gradle
        working-directory: android
        run: |
          echo "Building for ${{ matrix.abi }} (${{ matrix.build_type }})..."
          ./gradlew assemble${{ matrix.build_type == 'release' && 'Release' || 'Debug' }} \
            --no-daemon \
            --stacktrace \
            --info 2>&1 | tail -100
      
      - name: Verify APK
        run: |
          APK_DIR="android/app/build/outputs/apk/${{ matrix.build_type }}"
          echo "Looking for APK in: $APK_DIR"
          find android/app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          
          APK_FILE=$(find "$APK_DIR" -name "*.apk" -type f 2>/dev/null | head -1)
          
          if [ -n "$APK_FILE" ]; then
            echo "✅ APK found: $APK_FILE"
            echo "Size: $(du -sh "$APK_FILE" | cut -f1)"
          else
            echo "❌ No APK found!"
            echo ""
            echo "Build output directory contents:"
            find android/app/build -type f 2>/dev/null | head -30
            exit 1
          fi
      
      - name: Check APK Contents
        run: |
          APK_DIR="android/app/build/outputs/apk/${{ matrix.build_type }}"
          APK_FILE=$(find "$APK_DIR" -name "*.apk" -type f | head -1)
          
          echo "========================================="
          echo "APK Analysis:"
          echo "========================================="
          echo "File: $APK_FILE"
          echo "Size: $(du -sh "$APK_FILE" | cut -f1)"
          echo ""
          echo "Native libraries (.so files):"
          unzip -l "$APK_FILE" 2>/dev/null | grep "\.so" || echo "  No native .so files found"
          echo ""
          echo "Architecture: ${{ matrix.abi }}"
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.build_type }}-${{ matrix.abi }}
          path: android/app/build/outputs/apk/${{ matrix.build_type }}/*.apk
          retention-days: 30

  # ============================================================
  # Desktop Build Verification
  # ============================================================
  build-desktop:
    needs: setup-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Dependencies
        uses: actions/download-artifact@v4
        with:
          name: dependencies
      
      - name: Verify Dependencies
        run: |
          test -f "libs/randomx/src/randomx.h" || { echo "❌ RandomX missing"; exit 1; }
          test -f "libs/nlohmann/json.hpp" || { echo "❌ JSON missing"; exit 1; }
          echo "✅ All dependencies present"
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev
      
      - name: Configure CMake
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_WITH_SSL=ON \
            -DBUILD_WITH_HWLOC=OFF \
            -DENABLE_HUGEPAGES=OFF
      
      - name: Build Desktop Binary
        run: cmake --build build -j$(nproc)
      
      - name: Verify Binary
        run: |
          if [ -f "build/MoneroRandomXMiner" ]; then
            echo "✅ Desktop binary built successfully"
            file build/MoneroRandomXMiner
            echo ""
            echo "Linked libraries:"
            ldd build/MoneroRandomXMiner 2>/dev/null | grep -E "randomx|ssl|crypto" || echo "  (checking with objdump)"
            objdump -p build/MoneroRandomXMiner 2>/dev/null | grep NEEDED || true
          else
            echo "❌ Desktop binary not found"
            find build -type f -executable 2>/dev/null
            exit 1
          fi

  # ============================================================
  # Release
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Download ARM64 APK
        uses: actions/download-artifact@v4
        with:
          name: apk-debug-arm64-v8a
      
      - name: Download ARMv7 APK
        uses: actions/download-artifact@v4
        with:
          name: apk-debug-armeabi-v7a
      
      - name: List APKs
        run: ls -la *.apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
