# FILE: MoneroRandomXMiner/.github/workflows/android.yml
name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: '26.1.10909125'
  RANDOMX_VERSION: 'v1.1.10'
  GRADLE_VERSION: '8.5'

jobs:
  # ============================================================
  # STEP 1: Clone and prepare all dependencies
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            libs/randomx/
            libs/nlohmann/
          key: deps-v2-${{ env.RANDOMX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}
      
      - name: Clone RandomX
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "📦 Cloning RandomX..."
          mkdir -p libs
          git clone --depth 1 --branch ${{ env.RANDOMX_VERSION }} \
            https://github.com/tevador/RandomX.git libs/randomx
          
          if [ ! -f "libs/randomx/src/randomx.h" ]; then
            echo "❌ RandomX clone failed"
            exit 1
          fi
          echo "✅ RandomX cloned"
      
      - name: Download JSON library
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading JSON library..."
          mkdir -p libs/nlohmann
          
          wget -q -O libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp || \
          curl -fsSL -o libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp
          
          if [ ! -f "libs/nlohmann/json.hpp" ]; then
            echo "❌ JSON download failed"
            exit 1
          fi
          echo "✅ JSON downloaded"
      
      - name: Verify dependencies
        run: |
          echo "========================================="
          echo "Dependencies check:"
          echo "========================================="
          
          test -f "libs/randomx/src/randomx.h" && echo "✅ RandomX" || { echo "❌ RandomX missing"; exit 1; }
          test -f "libs/nlohmann/json.hpp" && echo "✅ JSON" || { echo "❌ JSON missing"; exit 1; }
          echo ""
          echo "Dependencies ready!"
      
      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: deps
          path: |
            libs/randomx/
            libs/nlohmann/
          retention-days: 1

  # ============================================================
  # STEP 2: Build APK for each architecture
  # ============================================================
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    
    steps:
      # --- Setup ---
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: deps
          path: libs/
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1" 2>/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV
      
      # --- Fix Permissions ---
      - name: Fix gradlew permissions
        run: |
          echo "Fixing gradlew permissions..."
          chmod +x android/gradlew
          ls -la android/gradlew
          if [ ! -x "android/gradlew" ]; then
            echo "❌ Cannot make gradlew executable"
            exit 1
          fi
          echo "✅ gradlew is executable"
      
      # --- Setup Gradle Wrapper ---
      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          echo "Setting up Gradle wrapper..."
          mkdir -p gradle/wrapper
          
          # Download wrapper JAR if missing
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading gradle-wrapper.jar..."
            wget -q -O gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v${{ env.GRADLE_VERSION }}.0/gradle/wrapper/gradle-wrapper.jar" 2>/dev/null
            
            if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
              echo "❌ Failed to download gradle-wrapper.jar"
              exit 1
            fi
          fi
          
          # Create properties file
          cat > gradle/wrapper/gradle-wrapper.properties << PROPS
           
          # Final permission fix
          chmod +x gradlew
          
          echo "Gradle wrapper ready:"
          ls -la gradlew gradle/wrapper/
      
      # --- Verify Structure ---
      - name: Verify project structure
        run: |
          echo "========================================="
          echo "Verifying project structure..."
          echo "========================================="
          
          # Check all required files exist
          FILES=(
            "libs/randomx/src/randomx.h"
            "libs/nlohmann/json.hpp"
            "android/build.gradle"
            "android/settings.gradle"
            "android/app/build.gradle"
            "android/app/src/main/AndroidManifest.xml"
            "android/app/src/main/cpp/CMakeLists.txt"
          )
          
          ALL_OK=true
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ MISSING: $file"
              ALL_OK=false
            fi
          done
          
          if [ "$ALL_OK" = false ]; then
            echo ""
            echo "❌ Some required files are missing!"
            exit 1
          fi
          
          echo ""
          echo "✅ All required files present"
      
      # --- Cache Gradle ---
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ env.GRADLE_VERSION }}-${{ matrix.abi }}-${{ hashFiles('android/**/*.gradle*') }}
      
      # --- Build ---
      - name: Build APK for ${{ matrix.abi }}
        working-directory: android
        run: |
          echo "========================================="
          echo "BUILD START"
          echo "========================================="
          echo "Architecture: ${{ matrix.abi }}"
          echo "Time: $(date)"
          echo ""
          
          # Run Gradle build
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            2>&1 | tee build-${{ matrix.abi }}.log
          
          RESULT=${PIPESTATUS[0]}
          
          echo ""
          echo "========================================="
          if [ $RESULT -eq 0 ]; then
            echo "✅ BUILD SUCCESSFUL"
          else
            echo "❌ BUILD FAILED (exit code: $RESULT)"
            echo ""
            echo "Last 40 lines of build log:"
            tail -40 build-${{ matrix.abi }}.log
          fi
          echo "========================================="
          
          exit $RESULT
      
      # --- Upload build log ---
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.abi }}
          path: android/build-${{ matrix.abi }}.log
          retention-days: 7
      
      # --- Upload APK ---
      - name: Find APK
        if: success()
        run: |
          echo "Looking for APK..."
          find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null
          
          APK=$(find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | head -1)
          
          if [ -z "$APK" ]; then
            echo "❌ No APK found!"
            find android/app/build -type f 2>/dev/null | head -20
            exit 1
          fi
          
          echo "✅ APK found: $APK"
          echo "Size: $(du -sh "$APK" | cut -f1)"
          echo "APK_PATH=$APK" >> $GITHUB_ENV
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: monero-miner-${{ matrix.abi }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

  # ============================================================
  # STEP 3: Release (only on tags)
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all APKs
        uses: actions/download-artifact@v4
      
      - name: List APKs
        run: |
          echo "APKs for release:"
          find . -name "*.apk" -type f -exec ls -la {} \;
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            monero-miner-arm64-v8a/*.apk
            monero-miner-armeabi-v7a/*.apk
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
