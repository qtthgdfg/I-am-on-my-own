# FILE: MoneroRandomXMiner/.github/workflows/android.yml
name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: '26.1.10909125'
  RANDOMX_VERSION: 'v1.1.10'
  GRADLE_VERSION: '8.5'

jobs:
  # ============================================================
  # STEP 1: Prepare dependencies
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            libs/randomx/
            libs/nlohmann/
          key: deps-v3-${{ env.RANDOMX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}
      
      - name: Clone RandomX
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "📦 Cloning RandomX..."
          mkdir -p libs
          git clone --depth 1 --branch ${{ env.RANDOMX_VERSION }} \
            https://github.com/tevador/RandomX.git libs/randomx
          
          if [ ! -f "libs/randomx/src/randomx.h" ]; then
            echo "❌ RandomX clone failed"
            exit 1
          fi
          echo "✅ RandomX cloned"
      
      - name: Download JSON library
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading JSON library..."
          mkdir -p libs/nlohmann
          
          wget -q -O libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp || \
          curl -fsSL -o libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp
          
          if [ ! -f "libs/nlohmann/json.hpp" ]; then
            echo "❌ JSON download failed"
            exit 1
          fi
          echo "✅ JSON downloaded"
      
      - name: Verify dependencies
        run: |
          echo "========================================="
          echo "Dependencies check:"
          echo "========================================="
          test -f "libs/randomx/src/randomx.h" && echo "✅ RandomX" || { echo "❌ RandomX missing"; exit 1; }
          test -f "libs/nlohmann/json.hpp" && echo "✅ JSON" || { echo "❌ JSON missing"; exit 1; }
      
      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: deps
          path: |
            libs/randomx/
            libs/nlohmann/
          retention-days: 1

  # ============================================================
  # STEP 2: Build APK
  # ============================================================
  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download dependencies
        uses: actions/download-artifact@v4
        with:
          name: deps
          path: libs/
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1" 2>/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV
      
      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          echo "========================================="
          echo "Setting up Gradle wrapper..."
          echo "========================================="
          
          # Create directories
          mkdir -p gradle/wrapper
          
          # Download gradle-wrapper.jar if missing
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading gradle-wrapper.jar..."
            wget -q -O gradle/wrapper/gradle-wrapper.jar \
              "https://raw.githubusercontent.com/gradle/gradle/v${{ env.GRADLE_VERSION }}.0/gradle/wrapper/gradle-wrapper.jar"
            
            if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
              echo "❌ Failed to download gradle-wrapper.jar"
              exit 1
            fi
            echo "✅ gradle-wrapper.jar downloaded"
          else
            echo "✅ gradle-wrapper.jar exists"
          fi
          
          # Create gradle-wrapper.properties using echo (NOT heredoc)
          echo "Creating gradle-wrapper.properties..."
          
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-${{ env.GRADLE_VERSION }}-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
          echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          
          # Verify the file
          echo ""
          echo "Properties file contents:"
          echo "---"
          cat gradle/wrapper/gradle-wrapper.properties
          echo "---"
          
          # Check required keys
          if ! grep -q "distributionUrl" gradle/wrapper/gradle-wrapper.properties; then
            echo "❌ distributionUrl missing!"
            exit 1
          fi
          
          if ! grep -q "distributionBase" gradle/wrapper/gradle-wrapper.properties; then
            echo "❌ distributionBase missing!"
            exit 1
          fi
          
          echo "✅ gradle-wrapper.properties created"
          
          # Fix permissions
          chmod +x gradlew
          echo "✅ gradlew is executable"
          
          # Final verification
          echo ""
          echo "Final check:"
          ls -la gradlew gradle/wrapper/
      
      - name: Verify project structure
        run: |
          echo "========================================="
          echo "Verifying project structure..."
          echo "========================================="
          
          FILES=(
            "libs/randomx/src/randomx.h"
            "libs/nlohmann/json.hpp"
            "android/gradle/wrapper/gradle-wrapper.jar"
            "android/gradle/wrapper/gradle-wrapper.properties"
            "android/build.gradle"
            "android/app/build.gradle"
            "android/app/src/main/AndroidManifest.xml"
          )
          
          ALL_OK=true
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ MISSING: $file"
              ALL_OK=false
            fi
          done
          
          if [ "$ALL_OK" = false ]; then
            exit 1
          fi
          echo "✅ All files present"
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ env.GRADLE_VERSION }}-${{ matrix.abi }}
      
      - name: Build APK
        working-directory: android
        run: |
          echo "========================================="
          echo "BUILD START - ${{ matrix.abi }}"
          echo "========================================="
          echo "Time: $(date)"
          echo ""
          
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            2>&1 | tee build.log
          
          RESULT=${PIPESTATUS[0]}
          
          echo ""
          echo "========================================="
          if [ $RESULT -eq 0 ]; then
            echo "✅ BUILD SUCCESSFUL"
          else
            echo "❌ BUILD FAILED (exit code: $RESULT)"
            echo ""
            echo "Last 40 lines:"
            tail -40 build.log
          fi
          echo "========================================="
          
          exit $RESULT
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.abi }}
          path: android/build.log
          retention-days: 7
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: monero-miner-${{ matrix.abi }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ============================================================
  # STEP 3: Release
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all APKs
        uses: actions/download-artifact@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            monero-miner-arm64-v8a/*.apk
            monero-miner-armeabi-v7a/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
