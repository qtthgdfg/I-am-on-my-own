# FILE: MoneroRandomXMiner/.github/workflows/android.yml
name: Android Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android/**'
      - 'src/**'
      - 'libs/**'
      - 'CMakeLists.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        options: [debug, release]
        default: debug

env:
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_NDK_VERSION: '26.1.10909125'
  RANDOMX_VERSION: 'v1.1.10'

jobs:
  # ============================================================
  # Setup Dependencies
  # ============================================================
  setup-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache RandomX & Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            libs/randomx/
            libs/nlohmann/
          key: deps-${{ runner.os }}-randomx-${{ env.RANDOMX_VERSION }}-${{ hashFiles('CMakeLists.txt') }}
      
      - name: Clone RandomX Library
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "📦 Cloning RandomX ${{ env.RANDOMX_VERSION }}..."
          mkdir -p libs
          git clone --branch ${{ env.RANDOMX_VERSION }} --depth 1 \
            https://github.com/tevador/RandomX.git libs/randomx
          
          if [ ! -f "libs/randomx/src/randomx.h" ]; then
            echo "❌ RandomX clone failed!"
            exit 1
          fi
          echo "✅ RandomX cloned successfully"
      
      - name: Download nlohmann/json
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading nlohmann/json..."
          mkdir -p libs/nlohmann
          wget -q -O libs/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp
          
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ JSON library downloaded ($(wc -c < libs/nlohmann/json.hpp) bytes)"
          else
            echo "❌ Failed to download JSON library"
            exit 1
          fi
      
      - name: Verify Dependencies
        run: |
          echo "========================================="
          echo "Verifying Dependencies in libs/:"
          echo "========================================="
          ls -la libs/
          echo ""
          
          if [ -f "libs/randomx/src/randomx.h" ]; then
            echo "✅ libs/randomx/src/randomx.h FOUND"
          else
            echo "❌ libs/randomx/src/randomx.h MISSING"
            find libs -name "randomx.h" 2>/dev/null || echo "No randomx.h found anywhere"
            exit 1
          fi
          
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ libs/nlohmann/json.hpp FOUND"
          else
            echo "❌ libs/nlohmann/json.hpp MISSING"
            find libs -name "json.hpp" 2>/dev/null || echo "No json.hpp found anywhere"
            exit 1
          fi
      
      # Upload without the libs/ prefix so they can be placed correctly later
      - name: Prepare Dependencies for Upload
        run: |
          mkdir -p /tmp/deps/randomx /tmp/deps/nlohmann
          cp -r libs/randomx/* /tmp/deps/randomx/
          cp libs/nlohmann/json.hpp /tmp/deps/nlohmann/
      
      - name: Upload Dependencies as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependencies
          path: /tmp/deps/
          retention-days: 1

  # ============================================================
  # Android APK Build
  # ============================================================
  build-apk:
    needs: setup-deps
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [debug]
        abi: [arm64-v8a, armeabi-v7a]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Dependencies
        uses: actions/download-artifact@v4
        with:
          name: dependencies
          path: libs/   # Extract to libs/ directory
      
      - name: Fix Dependency Structure (if needed)
        run: |
          echo "Current structure:"
          find . -name "randomx.h" -o -name "json.hpp" 2>/dev/null
          echo ""
          echo "libs/ contents:"
          ls -la libs/
          echo ""
          
          # If randomx ended up at wrong level, move it
          if [ -d "randomx" ] && [ ! -d "libs/randomx" ]; then
            echo "Moving randomx/ to libs/randomx/"
            mv randomx libs/
          fi
          
          # If nlohmann ended up at wrong level, move it
          if [ -d "nlohmann" ] && [ ! -d "libs/nlohmann" ]; then
            echo "Moving nlohmann/ to libs/nlohmann/"
            mv nlohmann libs/
          fi
          
          # If individual files, create proper structure
          if [ -f "libs/json.hpp" ] && [ ! -f "libs/nlohmann/json.hpp" ]; then
            echo "Moving libs/json.hpp to libs/nlohmann/json.hpp"
            mkdir -p libs/nlohmann
            mv libs/json.hpp libs/nlohmann/
          fi
      
      - name: Verify Dependencies After Download
        run: |
          echo "========================================="
          echo "Checking dependency locations:"
          echo "========================================="
          find . -name "randomx.h" -o -name "json.hpp" 2>/dev/null
          echo ""
          
          if [ -f "libs/randomx/src/randomx.h" ]; then
            echo "✅ RandomX at correct location: libs/randomx/src/randomx.h"
          else
            echo "❌ RandomX NOT at libs/randomx/src/randomx.h"
            echo "Searching for randomx.h:"
            find / -name "randomx.h" 2>/dev/null | head -5
            exit 1
          fi
          
          if [ -f "libs/nlohmann/json.hpp" ]; then
            echo "✅ JSON at correct location: libs/nlohmann/json.hpp"
          else
            echo "❌ JSON NOT at libs/nlohmann/json.hpp"
            find . -name "json.hpp" 2>/dev/null
            exit 1
          fi
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK and CMake
        run: |
          echo "Installing NDK ${{ env.ANDROID_NDK_VERSION }}..."
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1" 2>/dev/null || true
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> $GITHUB_ENV
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/build
          key: gradle-${{ runner.os }}-${{ matrix.abi }}-${{ hashFiles('android/**/*.gradle*') }}
      
      - name: Verify Android Project Structure
        run: |
          required_files=(
            "android/build.gradle"
            "android/settings.gradle"
            "android/gradle.properties"
            "android/app/build.gradle"
            "android/app/src/main/AndroidManifest.xml"
            "android/app/src/main/cpp/CMakeLists.txt"
            "android/app/src/main/cpp/android_main.cpp"
          )
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "  ✅ $file"
            else
              echo "  ❌ MISSING: $file"
              exit 1
            fi
          done
          echo "All required files present!"
      
      - name: Grant Gradle Permissions
        run: chmod +x android/gradlew
      
      - name: Build with Gradle
        working-directory: android
        run: |
          echo "Building for ${{ matrix.abi }} (${{ matrix.build_type }})..."
          ./gradlew assemble${{ matrix.build_type == 'release' && 'Release' || 'Debug' }} \
            --no-daemon \
            --stacktrace
      
      - name: Verify APK
        run: |
          APK_DIR="android/app/build/outputs/apk/${{ matrix.build_type }}"
          APK_FILE=$(find "$APK_DIR" -name "*.apk" -type f 2>/dev/null | head -1)
          
          if [ -n "$APK_FILE" ]; then
            echo "✅ APK found: $APK_FILE"
            echo "Size: $(du -sh "$APK_FILE" | cut -f1)"
            echo ""
            echo "Native libraries:"
            unzip -l "$APK_FILE" 2>/dev/null | grep "\.so" || echo "  No .so files"
          else
            echo "❌ No APK found!"
            find android/app/build -type f 2>/dev/null | head -30
            exit 1
          fi
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.build_type }}-${{ matrix.abi }}
          path: android/app/build/outputs/apk/${{ matrix.build_type }}/*.apk
          retention-days: 30

  # ============================================================
  # Release
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Download ARM64 APK
        uses: actions/download-artifact@v4
        with:
          name: apk-debug-arm64-v8a
      
      - name: Download ARMv7 APK
        uses: actions/download-artifact@v4
        with:
          name: apk-debug-armeabi-v7a
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
